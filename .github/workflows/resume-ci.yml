name: Resume Build and Preview

on:
  push:
    paths:
      - "my-modular-resume/**/*.tex"
      - "my-modular-resume/**/*.sty"
      - ".github/workflows/resume-ci.yml"
  pull_request:
    paths:
      - "my-modular-resume/**/*.tex"
      - "my-modular-resume/**/*.sty"
      - ".github/workflows/resume-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Tectonic
        uses: tectonic-typesetting/setup-tectonic@v2

      - name: Build PDF
        run: |
          mkdir -p build
          tectonic --keep-logs --synctex --outdir build my-modular-resume/resume.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: build/resume.pdf

      - name: Prepare Pages site
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p site
          cp build/resume.pdf site/resume.pdf
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>Resume Preview</title>
          </head>
          <body>
            <h1>Resume Preview</h1>
            <p><a href="./resume.pdf">Open latest PDF</a></p>
            <embed src="./resume.pdf" type="application/pdf" width="100%" height="900px" />
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
